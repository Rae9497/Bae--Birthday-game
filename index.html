<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 生日限定｜記憶編碼</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>2026 生日限定｜【記憶編碼】深度提取測驗</h1>
      <p class="sub">
        Memory Retrieval System Online…<br>
        歡迎登入「記憶提取系統」。<br>
        請依照你此刻的心跳頻率，選擇最吸引你的描述。<br><br>
        提醒：每個選項背後都連結著一段被加密的時空碎片。<br>
        （請用 A / B / C / D 回答。系統會記錄你的靈魂偏好）
      </p>
    </header>

    <main class="card">
      <div id="content"></div>

      <div class="actions">
        <button id="nextBtn" class="hidden">下一步</button>
        <button id="restartBtn" class="hidden">重新開始</button>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 Memory Retrieval System</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
